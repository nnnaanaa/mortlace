<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mortlace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #110508;
      --card:      #fdf6f9;
      --accent:    #8b2a50;
      --accent-lt: #c8739a;
      --border:    #c9a0b4;
      --thead-bg:  #2a0d1a;
      --thead-fg:  #f0d8e8;
      --text:      #1c0910;
      --muted:     #7a4a60;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html {
      background: var(--bg);
      background-image: url('gothic1.png'), url('gothic2.png');
      background-size: auto 100vh, auto 100vh;
      background-position: left center, right center;
      background-repeat: no-repeat, no-repeat;
      background-attachment: fixed, fixed;
    }

    body {
      font-family: 'Shippori Mincho', serif;
      color: var(--text);
      padding: 28px 24px;
      max-width: 900px;
      margin: 0 auto;
      background: var(--card);
      min-height: 100vh;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      box-shadow: 0 0 60px rgba(139,42,80,0.18);
    }

    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: var(--text);
      text-align: center;
      letter-spacing: 0.08em;
      padding-bottom: 14px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    h1::before { content: '✦ '; color: var(--accent-lt); }
    h1::after  { content: ' ✦'; color: var(--accent-lt); }

    h2 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(0.95rem, 3vw, 1.2rem);
      color: var(--accent);
      letter-spacing: 0.05em;
      margin: 22px 0 10px;
    }
    h2::before { content: '❖ '; font-size: 0.75em; opacity: 0.7; }

    h3 { font-family: 'Cinzel Decorative', serif; color: var(--text); letter-spacing: 0.05em; }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    input, select, textarea {
      padding: 6px 10px;
      margin: 2px;
      border: 1px solid var(--border);
      border-radius: 0;
      font-family: 'Shippori Mincho', serif;
      background: #fff8fb;
      color: var(--text);
      font-size: 0.9rem;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent-lt);
      box-shadow: 0 0 0 2px rgba(200,115,154,0.18);
    }

    button {
      padding: 5px 13px;
      cursor: pointer;
      border: 1px solid var(--accent);
      border-radius: 0;
      background: var(--accent);
      color: #feeef5;
      font-family: 'Shippori Mincho', serif;
      font-size: 0.875rem;
      letter-spacing: 0.04em;
      transition: opacity .15s;
    }
    button:hover { opacity: 0.82; }
    button.del  { background: #7a1c2a; border-color: #5a0c1a; }
    button.edit { background: #3e2460; border-color: #2e1450; }
    button.save { background: #1c5236; border-color: #0c4226; }

    tr.editing td { background: #fff0f5; }

    .table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.88rem;
      table-layout: fixed;
      border: 1px solid var(--border);
    }
    th, td {
      border: 1px solid var(--border);
      padding: 7px 10px;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    th { background: var(--thead-bg); color: var(--thead-fg); font-weight: 600; letter-spacing: 0.04em; }
    tr:nth-child(even) td { background: rgba(201,160,180,0.07); }
    tr:hover td { background: rgba(200,115,154,0.1); }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .tabs button {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 0;
      padding: 7px 18px;
      margin-bottom: -1px;
    }
    .tabs button.active {
      background: var(--card);
      color: var(--accent);
      border-bottom: 1px solid var(--card);
      font-weight: 600;
    }
    .tabs button:hover:not(.active) { background: rgba(201,160,180,0.15); opacity: 1; }

    .tab { display: none; }
    .tab.active { display: block; }

    .form-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .form-row input, .form-row select { flex: 1 1 140px; min-width: 0; }
    .form-row input[type="number"] { flex: 0 1 100px; }
    .form-row button { flex: 0 0 auto; }

    .col-img { width: 60px; }
    .col-img img { width: 50px; height: 50px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; display: block; margin: auto; }
    .col-price    { width: 80px; }
    .col-priority { width: 70px; }
    .col-actions  { width: 110px; white-space: nowrap; }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(17,5,8,0.6); z-index: 100;
    }
    .modal-box {
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(139,42,80,0.25);
      padding: 28px;
      max-width: 500px;
      margin: 60px auto;
      position: relative;
    }
    .modal-box h3 { margin: 0 0 18px; }
    .modal-grid { display: grid; gap: 8px; }
    .modal-grid input, .modal-grid select { width: 100%; }
    .modal-footer { margin-top: 18px; display: flex; gap: 8px; justify-content: flex-end; }
    .modal-label { font-size: 0.85rem; color: var(--muted); margin-bottom: 2px; display: block; }
    .img-preview { width: 100%; max-height: 200px; object-fit: contain; border: 1px solid var(--border); margin-top: 6px; display: none; }

    @media (max-width: 1300px) {
      html { background-image: none; }
    }
    @media (max-width: 600px) {
      body { padding: 14px 12px; }
      .form-row input, .form-row select { flex: 1 1 100%; }
      table { font-size: 0.8rem; }
      th, td { padding: 5px 6px; }
      .col-img { width: 44px; }
      .col-img img { width: 36px; height: 36px; }
      .col-price    { width: 60px; }
      .col-priority { width: 54px; }
      .col-actions  { width: 90px; }
      .modal-box { margin: 20px 12px; padding: 20px; }
    }
  </style>
</head>
<body>
<h1>mortlace</h1>

<div class="tabs">
  <button class="active" onclick="show('wishlist',this)">アイテム</button>
  <button onclick="show('brands',this)">ブランド</button>
  <button onclick="show('categories',this)">カテゴリー</button>
</div>

<!-- ウィッシュリスト -->
<div id="wishlist" class="tab active">
  <h2>追加</h2>
  <div class="form-row">
    <input id="w-url" placeholder="URL（必須）">
    <input id="w-name" placeholder="商品名">
    <select id="w-brand"><option value="">ブランド</option></select>
    <select id="w-category"><option value="">カテゴリー</option></select>
    <input id="w-price" type="number" placeholder="価格">
    <select id="w-priority">
      <option value="MEDIUM">中</option>
      <option value="LOW">低</option>
      <option value="HIGH">高</option>
      <option value="GRAIL">GRAIL</option>
    </select>
    <input id="w-notes" placeholder="メモ">
    <button onclick="addItem()">追加</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th class="col-img">画像</th><th>URL</th><th>商品名</th><th>ブランド</th><th>カテゴリー</th><th class="col-price">価格</th><th class="col-priority">優先度</th><th>メモ</th><th class="col-actions"></th></tr></thead>
      <tbody id="w-list"></tbody>
    </table>
  </div>
</div>

<!-- 編集モーダル（アイテム） -->
<div id="edit-modal" class="modal-overlay">
  <div class="modal-box">
    <h3>アイテム編集</h3>
    <input type="hidden" id="edit-id">
    <div class="modal-grid">
      <input id="edit-url" placeholder="URL（必須）">
      <input id="edit-name" placeholder="商品名">
      <select id="edit-brand"><option value="">ブランド</option></select>
      <select id="edit-category"><option value="">カテゴリー</option></select>
      <input id="edit-price" type="number" placeholder="価格">
      <select id="edit-priority">
        <option value="LOW">低</option>
        <option value="MEDIUM">中</option>
        <option value="HIGH">高</option>
        <option value="GRAIL">GRAIL</option>
      </select>
      <input id="edit-notes" placeholder="メモ">
      <div>
        <label class="modal-label">画像</label>
        <input id="edit-image-file" type="file" accept="image/*" onchange="previewImg(this)">
        <img id="edit-image-preview" class="img-preview">
      </div>
    </div>
    <div class="modal-footer">
      <button onclick="closeEdit()">キャンセル</button>
      <button class="save" onclick="saveItem()">保存</button>
    </div>
  </div>
</div>

<!-- 画像拡大モーダル -->
<div id="img-modal" style="display:none;position:fixed;inset:0;background:rgba(17,5,8,0.8);z-index:200;cursor:pointer" onclick="this.style.display='none'">
  <img id="img-modal-src" style="max-width:90%;max-height:90%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid #c9a0b4">
</div>

<!-- ブランド -->
<div id="brands" class="tab">
  <h2>追加</h2>
  <div class="form-row">
    <input id="b-name" placeholder="ブランド名（必須）">
    <input id="b-url" placeholder="公式URL">
    <button onclick="addBrand()">追加</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>名前</th><th>URL</th><th></th></tr></thead>
      <tbody id="b-list"></tbody>
    </table>
  </div>
</div>

<!-- カテゴリー -->
<div id="categories" class="tab">
  <h2>追加</h2>
  <div class="form-row">
    <input id="c-name" placeholder="カテゴリー名（必須）">
    <button onclick="addCategory()">追加</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>名前</th><th></th></tr></thead>
      <tbody id="c-list"></tbody>
    </table>
  </div>
</div>

<script>
function show(id, btn) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

const get = id => document.getElementById(id);
const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

async function api(path, opt) {
  const r = await fetch('/api' + path, opt);
  return r.ok ? r : Promise.reject(r.status);
}

// ---- ウィッシュリスト ----
async function loadItems() {
  const items = await (await api('/wishlist')).json();
  get('w-list').innerHTML = items.length ? items.map(i => `<tr>
    <td class="col-img">${i.imageUrl ? `<img src="${esc(i.imageUrl)}" alt="画像" onclick="viewImg('${esc(i.imageUrl)}')">` : ''}</td>
    <td title="${esc(i.url)}"><a href="${esc(i.url)}" target="_blank">${esc(i.url)}</a></td>
    <td title="${esc(i.name)}">${esc(i.name)}</td>
    <td title="${esc(i.brand?.name)}">${esc(i.brand?.name)}</td>
    <td title="${esc(i.category?.name)}">${esc(i.category?.name)}</td>
    <td class="col-price">${i.price != null ? '¥'+Number(i.price).toLocaleString() : ''}</td>
    <td class="col-priority">${esc(i.priority)}</td>
    <td title="${esc(i.notes)}">${esc(i.notes)}</td>
    <td class="col-actions"><button class="edit" onclick="openEdit(${i.id})">編集</button> <button class="del" onclick="delItem(${i.id})">削除</button></td>
  </tr>`).join('') : '<tr><td colspan="9">なし</td></tr>';
}

async function addItem() {
  const url = get('w-url').value.trim();
  if (!url) return alert('URLは必須です');
  const body = { url, priority: get('w-priority').value };
  const name = get('w-name').value.trim();
  const brandId = get('w-brand').value;
  const categoryId = get('w-category').value;
  const price = get('w-price').value;
  const notes = get('w-notes').value.trim();
  if (name) body.name = name;
  if (brandId) body.brandId = +brandId;
  if (categoryId) body.categoryId = +categoryId;
  if (price) body.price = +price;
  if (notes) body.notes = notes;
  await api('/wishlist', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  get('w-url').value = get('w-name').value = get('w-price').value = get('w-notes').value = '';
  get('w-brand').value = get('w-category').value = '';
  loadItems();
}

async function delItem(id) {
  if (confirm('削除しますか？')) { await api('/wishlist/'+id, {method:'DELETE'}); loadItems(); }
}

let _editItem = null;
async function openEdit(id) {
  _editItem = await (await api('/wishlist/'+id)).json();
  const i = _editItem;
  get('edit-id').value = i.id;
  get('edit-url').value = i.url ?? '';
  get('edit-name').value = i.name ?? '';
  get('edit-price').value = i.price ?? '';
  get('edit-notes').value = i.notes ?? '';
  get('edit-priority').value = i.priority ?? 'MEDIUM';
  // セレクトの選択肢を同期してから値をセット
  const bSel = get('edit-brand');
  bSel.innerHTML = get('w-brand').innerHTML;
  bSel.value = i.brand?.id ?? '';
  const cSel = get('edit-category');
  cSel.innerHTML = get('w-category').innerHTML;
  cSel.value = i.category?.id ?? '';
  // 画像プレビュー
  get('edit-image-file').value = '';
  const preview = get('edit-image-preview');
  if (i.imageUrl) { preview.src = i.imageUrl + '?t=' + Date.now(); preview.style.display = 'block'; }
  else { preview.style.display = 'none'; preview.src = ''; }
  get('edit-modal').style.display = 'block';  // modal-overlay uses display:block
}

function previewImg(input) {
  const preview = get('edit-image-preview');
  if (input.files && input.files[0]) {
    preview.src = URL.createObjectURL(input.files[0]);
    preview.style.display = 'block';
  }
}

function viewImg(url) {
  get('img-modal-src').src = url + '?t=' + Date.now();
  get('img-modal').style.display = 'block';
}

function closeEdit() {
  get('edit-modal').style.display = 'none';
}

async function saveItem() {
  const url = get('edit-url').value.trim();
  if (!url) return alert('URLは必須です');
  const id = get('edit-id').value;
  const body = { url, priority: get('edit-priority').value };
  const name = get('edit-name').value.trim();
  const brandId = get('edit-brand').value;
  const categoryId = get('edit-category').value;
  const price = get('edit-price').value;
  const notes = get('edit-notes').value.trim();
  if (name) body.name = name;
  if (brandId) body.brandId = +brandId;
  if (categoryId) body.categoryId = +categoryId;
  if (price) body.price = +price;
  if (notes) body.notes = notes;
  await api('/wishlist/'+id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  const imgFile = get('edit-image-file').files[0];
  if (imgFile) {
    const fd = new FormData();
    fd.append('file', imgFile);
    await api('/wishlist/'+id+'/image', { method:'POST', body:fd });
  }
  closeEdit();
  loadItems();
}

// ---- ブランド ----
async function loadBrands() {
  const brands = await (await api('/brands')).json();
  ['w-brand'].forEach(sid => {
    const sel = get(sid);
    const cur = sel.value;
    sel.innerHTML = '<option value="">ブランド</option>' + brands.map(b => `<option value="${b.id}">${esc(b.name)}</option>`).join('');
    sel.value = cur;
  });
  get('b-list').innerHTML = brands.map(b => `<tr>
    <td>${esc(b.name)}</td>
    <td>${b.url ? `<a href="${esc(b.url)}" target="_blank">${esc(b.url)}</a>` : ''}</td>
    <td><button class="edit" onclick="editBrand(${b.id},'${esc(b.name)}','${esc(b.url??'')}')">編集</button> <button class="del" onclick="delBrand(${b.id})">削除</button></td>
  </tr>`).join('') || '<tr><td colspan="3">なし</td></tr>';
}

async function addBrand() {
  const name = get('b-name').value.trim();
  if (!name) return alert('ブランド名は必須です');
  const url = get('b-url').value.trim();
  await api('/brands', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, url:url||null}) })
    .catch(s => s===409 ? alert('既に存在します') : null);
  get('b-name').value = get('b-url').value = '';
  loadBrands();
}

async function delBrand(id) {
  if (confirm('削除しますか？')) { await api('/brands/'+id, {method:'DELETE'}); loadBrands(); }
}

function editBrand(id, name, url) {
  const row = [...document.querySelectorAll('#b-list tr')].find(r => r.innerHTML.includes(`editBrand(${id},`));
  if (!row) return;
  row.classList.add('editing');
  row.innerHTML = `
    <td><input id="eb-name-${id}" value="${esc(name)}" placeholder="ブランド名（必須）"></td>
    <td><input id="eb-url-${id}" value="${esc(url)}" placeholder="公式URL" size="30"></td>
    <td>
      <button class="save" onclick="saveBrand(${id})">保存</button>
      <button onclick="loadBrands()">キャンセル</button>
    </td>`;
}

async function saveBrand(id) {
  const name = get('eb-name-'+id).value.trim();
  if (!name) return alert('ブランド名は必須です');
  const url = get('eb-url-'+id).value.trim();
  await api('/brands/'+id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, url:url||null}) })
    .catch(s => s===409 ? alert('既に存在します') : null);
  loadBrands();
}

// ---- カテゴリー ----
async function loadCategories() {
  const cats = await (await api('/categories')).json();
  ['w-category'].forEach(sid => {
    const sel = get(sid);
    const cur = sel.value;
    sel.innerHTML = '<option value="">カテゴリー</option>' + cats.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
    sel.value = cur;
  });
  get('c-list').innerHTML = cats.map(c => `<tr>
    <td>${esc(c.name)}</td>
    <td><button class="edit" onclick="editCategory(${c.id},'${esc(c.name)}')">編集</button> <button class="del" onclick="delCategory(${c.id})">削除</button></td>
  </tr>`).join('') || '<tr><td colspan="2">なし</td></tr>';
}

async function addCategory() {
  const name = get('c-name').value.trim();
  if (!name) return alert('カテゴリー名は必須です');
  await api('/categories', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name}) })
    .catch(s => s===409 ? alert('既に存在します') : null);
  get('c-name').value = '';
  loadCategories();
}

async function delCategory(id) {
  if (confirm('削除しますか？')) { await api('/categories/'+id, {method:'DELETE'}); loadCategories(); }
}

function editCategory(id, name) {
  const row = [...document.querySelectorAll('#c-list tr')].find(r => r.innerHTML.includes(`editCategory(${id},`));
  if (!row) return;
  row.classList.add('editing');
  row.innerHTML = `
    <td><input id="ec-name-${id}" value="${esc(name)}" placeholder="カテゴリー名（必須）"></td>
    <td>
      <button class="save" onclick="saveCategory(${id})">保存</button>
      <button onclick="loadCategories()">キャンセル</button>
    </td>`;
}

async function saveCategory(id) {
  const name = get('ec-name-'+id).value.trim();
  if (!name) return alert('カテゴリー名は必須です');
  await api('/categories/'+id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name}) })
    .catch(s => s===409 ? alert('既に存在します') : null);
  loadCategories();
}

loadItems(); loadBrands(); loadCategories();
</script>
</body>
</html>
