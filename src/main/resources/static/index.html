<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mortlace</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#7c3faa">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="mortlace">
  <link rel="apple-touch-icon" href="/gloli.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #07050e;
      --card:      #0e0b18;
      --accent:    #7c3faa;
      --accent-lt: #a865d4;
      --border:    #2a1648;
      --thead-bg:  #07050e;
      --thead-fg:  #c4a0e0;
      --text:      #ede4f8;
      --muted:     #7a658e;
      --wine:      #6b1a2a;
      --font-body: "Plus Jakarta Sans", "Hiragino Kaku Gothic ProN", "Hiragino Kaku Gothic Pro", "Hiragino Kaku Gothic", YuGothic, "Yu Gothic", "メイリオ", Meiryo, "ＭＳ Ｐゴシック", "MS PGothic", sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body { background: var(--bg); }

    body {
      font-family: var(--font-body);
      color: var(--text);
      padding: 28px 24px;
      max-width: 900px;
      margin: 0 auto;
      min-height: 100vh;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    h1 {
      font-family: var(--font-body);
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: var(--text);
      text-align: center;
      letter-spacing: 0.14em;
      margin-bottom: 28px;
    }

    h2 {
      font-family: var(--font-body);
      font-size: clamp(0.95rem, 3vw, 1.2rem);
      color: var(--accent);
      letter-spacing: 0.05em;
      margin: 22px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    h3 { font-family: var(--font-body); color: var(--text); letter-spacing: 0.05em; }

    a { color: var(--accent-lt); text-decoration: none; }
    a:hover { text-decoration: underline; }

    input, select, textarea {
      padding: 8px 12px;
      margin: 2px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--font-body);
      background: #120d20;
      color: var(--text);
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 63, 170, 0.25);
    }

    button {
      padding: 6px 14px;
      cursor: pointer;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: #f0eafc;
      font-family: var(--font-body);
      font-size: 0.875rem;
      letter-spacing: 0.04em;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity .15s, box-shadow .15s;
    }
    button:hover { opacity: 0.88; box-shadow: 0 0 0 3px rgba(124, 63, 170, 0.2); }
    button.del  { background: #1e0c12; border-color: var(--wine); color: #d4a0a8; }
    button.edit { background: #180e2c; border-color: #2e1a50; }
    button.save { background: #120e20; border-color: #241840; }

    /* ---- generic table (Brands / Categories) ---- */
    .table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.88rem;
      table-layout: fixed;
      border: 1px solid var(--border);
    }
    th, td {
      border: 1px solid var(--border);
      padding: 7px 10px;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    th { background: var(--thead-bg); color: var(--thead-fg); font-weight: 600; letter-spacing: 0.04em; }
    tr:nth-child(even) td { background: rgba(255,255,255,0.03); }
    tr:hover td { background: rgba(168,164,184,0.07); }

    /* ---- Sort bar ---- */
    .sort-bar {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
      margin: 10px 0 4px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .sort-bar button {
      padding: 3px 10px;
      font-size: 0.78rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      opacity: 1;
    }
    .sort-bar button:hover { border-color: var(--accent); color: var(--accent-lt); }
    .sort-bar button.active { border-color: var(--accent); color: var(--accent-lt); background: rgba(168,164,184,0.08); }
    .sort-bar button[data-field].active::after {
      content: '';
      display: inline-block;
      width: 0; height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-bottom: 5px solid var(--accent);
      vertical-align: middle;
      margin-left: 5px;
    }
    .sort-bar button[data-field].active.desc::after {
      border-bottom: none;
      border-top: 5px solid var(--accent);
    }

    /* ---- Collection summary sub-bar ---- */
    .summary-sub {
      font-size: 0.82rem; color: var(--muted);
      padding: 6px 12px; margin-bottom: 2px;
    }

    /* ---- Items: card layout ---- */
    #wishlist .table-wrap, #archive .table-wrap, #collection .table-wrap { overflow-x: visible; }
    #wishlist table, #archive table, #collection table { display: block; border: none; table-layout: auto; margin-top: 14px; }
    #wishlist thead, #archive thead, #collection thead { display: none; }
    #collection tbody {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }
    #collection tr {
      display: flex; flex-direction: column;
      border: 1px solid var(--border); background: var(--card);
      overflow: hidden; transition: border-color 0.15s;
    }
    #collection tr:hover { border-color: var(--accent); }
    #collection tr:hover td, #collection tr:nth-child(even) td { background: transparent; }
    #collection td {
      display: flex; align-items: flex-start; gap: 10px;
      border: none; border-bottom: 1px solid rgba(50,46,60,0.5);
      padding: 7px 10px; white-space: normal; overflow: visible; width: auto !important;
    }
    #collection td:last-child { border-bottom: none; }
    #collection td::before {
      content: attr(data-label); color: var(--muted);
      font-size: 0.8rem; font-weight: 600; min-width: 68px; flex-shrink: 0;
    }
    #collection td.col-img {
      padding: 0; height: 200px; overflow: hidden;
      border-bottom: 1px solid var(--border); cursor: pointer;
    }
    #collection td.col-img::before { display: none; }
    #collection td.col-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.35s ease; }
    #collection td.col-img:hover img { transform: scale(1.04); }
    #collection td.col-actions { justify-content: flex-end; flex-wrap: wrap; gap: 4px; padding: 8px 10px; margin-top: auto; }
    #collection td.col-actions::before { display: none; }

    #archive tbody {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }
    #archive tr {
      display: flex; flex-direction: column;
      border: 1px solid var(--border); background: var(--card);
      overflow: hidden;
      opacity: 0.65;
      transition: opacity 0.15s, border-color 0.15s;
    }
    #archive tr:hover { border-color: var(--accent); opacity: 1; }
    #archive tr:hover td, #archive tr:nth-child(even) td { background: transparent; }
    #archive td {
      display: flex; align-items: flex-start; gap: 10px;
      border: none; border-bottom: 1px solid rgba(50,46,60,0.5);
      padding: 7px 10px; white-space: normal; text-overflow: clip;
      overflow: visible; width: auto !important;
    }
    #archive td:last-child { border-bottom: none; }
    #archive td::before {
      content: attr(data-label); color: var(--muted);
      font-size: 0.8rem; font-weight: 600; min-width: 68px; flex-shrink: 0;
    }
    #archive td.col-img {
      padding: 0; height: 160px; overflow: hidden;
      border-bottom: 1px solid var(--border); cursor: pointer;
    }
    #archive td.col-img::before { display: none; }
    #archive td.col-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    #archive td.col-actions { justify-content: flex-end; flex-wrap: wrap; gap: 4px; padding: 8px 10px; margin-top: auto; }
    #archive td.col-actions::before { display: none; }
    #wishlist tbody {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }
    #wishlist tr {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      background: var(--card);
      overflow: hidden;
      transition: border-color 0.15s;
    }
    #wishlist tr:hover { border-color: var(--accent); }
    #wishlist tr:hover td,
    #wishlist tr:nth-child(even) td { background: transparent; }
    #wishlist tr.editing { border-color: var(--accent-lt); }
    #wishlist tr.editing td { background: #160e24; }
    #wishlist td {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      border: none;
      border-bottom: 1px solid rgba(50,46,60,0.5);
      padding: 7px 10px;
      white-space: normal;
      text-overflow: clip;
      overflow: visible;
      width: auto !important;
    }
    #wishlist td:last-child { border-bottom: none; }
    #wishlist td::before {
      content: attr(data-label);
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      min-width: 68px;
      flex-shrink: 0;
    }
    #wishlist td.col-img {
      padding: 0;
      height: 200px;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    #wishlist td.col-img::before { display: none; }
    #wishlist td.col-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }
    #wishlist td.col-img:hover img { transform: scale(1.04); }
    #wishlist td.col-actions { justify-content: flex-end; flex-wrap: wrap; gap: 4px; padding: 8px 10px; margin-top: auto; }
    #wishlist td.col-actions::before { display: none; }
    #wishlist td[data-label="URL"] { flex-wrap: wrap; align-items: center; }
    #wishlist td[data-label="URL"] .url-value {
      display: flex; align-items: center; gap: 4px; flex: 1; min-width: 0;
    }
    #wishlist td[data-label="URL"] a {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      min-width: 0; flex: 1;
    }

    .tabs {
      display: flex;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 3px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    .tabs button {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      padding: 7px 16px;
      margin-bottom: -1px;
      white-space: nowrap;
    }
    .tabs button.active {
      background: var(--card);
      color: var(--accent-lt);
      border-bottom: 1px solid var(--card);
      font-weight: 600;
    }
    .tabs button:hover:not(.active) { background: rgba(168,164,184,0.08); opacity: 1; }

    .tab { display: none; }
    .tab.active { display: block; }

    .form-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 4px; }
    .form-row input, .form-row select { flex: 1 1 130px; min-width: 0; }
    .form-row button { flex: 0 0 auto; }

    #w-url                     { flex: 1 1 260px; }
    #w-name                    { flex: 2 1 160px; }
    #w-brand, #w-category      { flex: 1 1 110px; }
    #w-priority                { flex: 0 1 100px; }
    #w-price                   { flex: 0 0 90px; }
    #w-notes, #w-image-url     { flex: 2 1 160px; }

    .sort-sep { flex: 1; }
    .sort-label, .col-label { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }

    /* ---- Filter bar ---- */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin: 6px 0 4px;
    }
    .filter-bar input  { flex: 2 1 160px; min-width: 0; }
    .filter-bar select { flex: 1 1 120px; min-width: 0; }
    #f-clear { flex: 0 0 auto; background: transparent; border-color: var(--wine); color: #d4a0a8; font-size: 0.82rem; padding: 5px 12px; }
    .filter-active-label { font-size: 0.78rem; color: var(--muted); margin-left: 2px; }


    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(4,4,4,0.85); z-index: 100;
    }
    .modal-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(124,63,170,0.15);
      padding: 28px;
      max-width: 500px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      margin: 40px auto;
    }
    .modal-box h3 { margin: 0 0 18px; }
    .modal-grid { display: grid; gap: 8px; }
    .modal-grid input, .modal-grid select { width: 100%; }
    .modal-footer { margin-top: 18px; display: flex; gap: 8px; justify-content: flex-end; }
    .modal-label { font-size: 0.85rem; color: var(--muted); margin-bottom: 2px; display: block; }
    .img-preview { width: 100%; max-height: 200px; object-fit: contain; border: 1px solid var(--border); margin-top: 6px; display: none; }

    .file-input-wrap { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .file-input-wrap input[type="file"] { display: none; }
    .file-btn-label {
      padding: 6px 14px; cursor: pointer;
      border: 1px solid var(--accent); background: var(--accent);
      border-radius: 6px;
      color: #f0eafc; font-family: var(--font-body);
      font-size: 0.875rem; letter-spacing: 0.04em; white-space: nowrap;
      transition: opacity .15s;
    }
    .file-btn-label:hover { opacity: 0.82; }
    .file-name-display { font-size: 0.85rem; color: var(--muted); }

    /* ---- Toast ---- */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #1e1430;
      border: 1px solid var(--accent);
      color: var(--accent-lt);
      padding: 9px 22px;
      border-radius: 20px;
      font-size: 0.88rem;
      letter-spacing: 0.04em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 300;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ---- Summary bar ---- */
    #summary-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      align-items: center;
      padding: 8px 12px;
      margin: 10px 0 6px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    #summary-bar .s-total { color: var(--text); font-weight: 600; }
    #summary-bar .s-price { color: var(--accent-lt); }
    .s-chip {
      padding: 2px 9px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 0.78rem;
    }
    .s-chip.low    { border-color: #2a3a2a; color: #7eb87e; }
    .s-chip.medium { border-color: #2a2a3a; color: #7e8ebe; }
    .s-chip.high   { border-color: #3a2a2a; color: #be8e7e; }
    .s-chip.grail  { border-color: #3a1f4a; color: var(--accent-lt); }

    /* ---- Status select ---- */
    .status-sel {
      padding: 2px 8px;
      font-size: 0.78rem;
      border-radius: 10px;
      cursor: pointer;
      font-family: var(--font-body);
      transition: border-color 0.15s;
    }
    .status-sel.wanted  { border-color: var(--border); color: var(--muted); background: transparent; }
    .status-sel.ordered { border-color: #6a5010; color: #c8a040; background: #1a1408; }
    .status-sel.owned   { border-color: #1a4a2a; color: #60b878; background: #0a1810; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* === Responsive === */

    @media (max-width: 768px) {
      #wishlist tbody, #archive tbody, #collection tbody {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      }
      #w-name { flex: 1 1 100%; }
      #w-brand, #w-category { flex: 1 1 120px; }
    }

    @media (max-width: 600px) {
      body { padding: 12px 10px; border-left: none; border-right: none; }

      /* タブ: 2行折り返し、サイズは縮めない */
      .tabs { flex-wrap: wrap; gap: 3px; }
      .tabs button { padding: 7px 12px; font-size: 0.85rem; letter-spacing: 0; }

      /* Add form: 入力を100%、ボタンも100% */
      .form-row input, .form-row select, .form-row button { flex: 1 1 100%; }
      #w-url, #w-name, #w-brand, #w-category,
      #w-price, #w-priority, #w-notes, #w-image-url { flex: 1 1 100%; }

      /* フィルターバー: 2カラムグリッドに */
      .filter-bar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      #f-search { grid-column: 1 / -1; }
      #f-clear  { grid-column: 1 / -1; }

      /* ソートバー: スペーサーのみ非表示、Colsボタンは表示 */
      .sort-sep { display: none; }

      /* カード: 1カラム */
      #wishlist tbody, #archive tbody, #collection tbody { grid-template-columns: 1fr; }
      #wishlist td.col-img, #collection td.col-img { height: 200px; }
      #archive td.col-img { height: 150px; }
      #wishlist td::before, #archive td::before, #collection td::before { min-width: 52px; font-size: 0.75rem; }

      /* カードのボタン: 小さめに */
      #wishlist td.col-actions button,
      #archive td.col-actions button,
      #collection td.col-actions button { font-size: 0.78rem; padding: 4px 10px; }

      /* モーダル */
      .modal-box { margin: 8px; padding: 16px; max-height: calc(100vh - 16px); }

      /* ブランド・カテゴリーテーブル */
      #brands table, #categories table { font-size: 0.8rem; }
      #brands th, #brands td, #categories th, #categories td { padding: 5px 6px; }

      /* サマリーバー */
      #summary-bar { font-size: 0.78rem; padding: 6px 10px; gap: 4px 8px; }
    }

    @media (max-width: 400px) {
      h1 { font-size: 1.3rem; margin-bottom: 18px; }
    }

    /* ---- Loading screen ---- */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    #loading-screen img { width: 220px; display: block; }
    #loading-screen .loading-title {
      margin-top: 16px;
      font-family: var(--font-body);
      font-size: 1.4rem;
      letter-spacing: 0.22em;
      color: var(--accent-lt);
    }
    .loading-bubble {
      background: #1a1030;
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 0.92rem;
      color: var(--text);
      letter-spacing: 0.05em;
      position: relative;
      margin-bottom: 4px;
    }
    .loading-bubble::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 8px solid transparent;
      border-top: 8px solid var(--accent);
    }
    @media (max-width: 600px) { #loading-screen img { width: 160px; } }

    /* ---- Mascot ---- */
    #mascot-wrap {
      position: fixed;
      top: 120px;
      right: 16px;
      z-index: 50;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }
    #mascot-wrap:active { cursor: grabbing; }
    #mascot-wrap img { width: 240px; display: block; }
    #mascot-bubble {
      position: absolute;
      right: calc(100% + 12px);
      top: 16px;
      background: #1a1030;
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 8px 16px;
      font-size: 0.82rem;
      color: var(--text);
      white-space: nowrap;
      letter-spacing: 0.04em;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }
    #mascot-bubble::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 100%;
      transform: translateY(-50%);
      border: 7px solid transparent;
      border-left: 7px solid var(--accent);
    }
    #mascot-wrap:hover #mascot-bubble { opacity: 1; }
    @media (max-width: 900px) { #mascot-wrap img { width: 160px; } }
    @media (max-width: 600px) { #mascot-wrap img { width: 96px; } }
  </style>
</head>
<body>
<div id="loading-screen">
  <div class="loading-bubble" id="loading-bubble">少々お待ちを…</div>
  <img src="/gloli.png" alt="">
  <div class="loading-title">mortlace</div>
</div>
<div id="toast"></div>
<h1>mortlace</h1>

<div class="tabs">
  <button class="active" onclick="show('wishlist',this)">Items</button>
  <button onclick="show('collection',this)">Collection</button>

<script>
let _toastTimer;
function showToast(msg) {
  const el = get('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

function show(id, btn) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if (id === 'archive') loadArchive();
  if (id === 'collection') loadCollection();
}

const get = id => document.getElementById(id);
const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

async function api(path, opt) {
  const r = await fetch('/api' + path, opt);
  return r.ok ? r : Promise.reject(r.status);
}

// ---- Wishlist ----
let _items = [], _sortField = null, _sortAsc = true;
let _filter = { q: '', brandId: '', categoryId: '', status: '', priority: '' };
const PRIORITY_ORDER = { LOW: 1, MEDIUM: 2, HIGH: 3, GRAIL: 4 };

function applyFilter() {
  _filter.q          = get('f-search').value;
  _filter.brandId    = get('f-brand').value;
  _filter.categoryId = get('f-category').value;
  _filter.status     = get('f-status').value;
  _filter.priority   = get('f-priority').value;
  renderItems();
}

function clearFilter() {
  get('f-search').value = '';
  get('f-brand').value = get('f-category').value = get('f-status').value = get('f-priority').value = '';
  _filter = { q: '', brandId: '', categoryId: '', status: '', priority: '' };
  renderItems();
}

function renderSummary(items, totalOverride) {
  const src = items ?? _items;
  const bar = get('summary-bar');
  if (!_items.length) { bar.innerHTML = '<span>No items</span>'; return; }
  const count = src.length;
  const countLabel = totalOverride != null
    ? `<span class="s-total">${count} / ${totalOverride} items</span>`
    : `<span class="s-total">${count} items</span>`;
  const ordered = src.filter(i => i.status === 'ORDERED').length;
  const priced = src.filter(i => i.price != null);
  const totalPrice = priced.reduce((s, i) => s + Number(i.price), 0);
  const counts = { LOW: 0, MEDIUM: 0, HIGH: 0, GRAIL: 0 };
  src.forEach(i => { if (counts[i.priority] != null) counts[i.priority]++; });
  const chips = [
    counts.LOW    ? `<span class="s-chip low">Low ${counts.LOW}</span>` : '',
    counts.MEDIUM ? `<span class="s-chip medium">Medium ${counts.MEDIUM}</span>` : '',
    counts.HIGH   ? `<span class="s-chip high">High ${counts.HIGH}</span>` : '',
    counts.GRAIL  ? `<span class="s-chip grail">Grail ${counts.GRAIL}</span>` : '',
    ordered       ? `<span class="s-chip" style="border-color:#6a5010;color:#c8a040">Ordered ${ordered}</span>` : '',
  ].join('');
  bar.innerHTML = countLabel
    + (priced.length ? `<span class="s-price">¥${totalPrice.toLocaleString()}</span>` : '')
    + chips;
}

function renderItems() {
  // --- filter ---
  const q = _filter.q.toLowerCase().trim();
  let items = _items.filter(i => {
    if (q && ![ i.name, i.brand?.name, i.category?.name, i.notes, i.url ]
              .some(v => (v || '').toLowerCase().includes(q))) return false;
    if (_filter.brandId    && String(i.brand?.id    ?? '') !== _filter.brandId)    return false;
    if (_filter.categoryId && String(i.category?.id ?? '') !== _filter.categoryId) return false;
    if (_filter.status     && i.status   !== _filter.status)   return false;
    if (_filter.priority   && i.priority !== _filter.priority) return false;
    return true;
  });
  const isFiltered = q || _filter.brandId || _filter.categoryId || _filter.status || _filter.priority;
  get('f-clear').style.display = isFiltered ? '' : 'none';

  // --- sort ---
  if (_sortField) {
    items.sort((a, b) => {
      let va, vb, r;
      if (_sortField === 'price') {
        va = a.price ?? -1; vb = b.price ?? -1; r = va - vb;
      } else if (_sortField === 'priority') {
        va = PRIORITY_ORDER[a.priority] ?? 0; vb = PRIORITY_ORDER[b.priority] ?? 0; r = va - vb;
      } else {
        const get2 = (i) => (_sortField === 'brand' ? i.brand?.name : _sortField === 'category' ? i.category?.name : i.name) ?? '';
        r = get2(a).localeCompare(get2(b), 'ja');
      }
      return _sortAsc ? r : -r;
    });
  }
  renderSummary(isFiltered ? items : null, isFiltered ? _items.length : null);
  get('w-list').innerHTML = items.length ? items.map(i => `<tr>
    ${i.imageUrl ? `<td class="col-img" data-label="" onclick="viewImg('${esc(i.imageUrl)}')"><img src="${esc(i.imageUrl)}" alt="image"></td>` : ''}
    <td data-label="URL" title="${esc(i.url)}"><span class="url-value"><a href="${esc(i.url)}" target="_blank">${esc((() => { try { return new URL(i.url).hostname; } catch(e) { return i.url; } })())}</a></span></td>
    <td data-label="Name" title="${esc(i.name)}">${esc(i.name)}</td>
    <td data-label="Brand" title="${esc(i.brand?.name)}">${esc(i.brand?.name)}</td>
    <td data-label="Category" title="${esc(i.category?.name)}">${esc(i.category?.name)}</td>
    <td class="col-price" data-label="Price">${i.price != null ? '¥'+Number(i.price).toLocaleString() : ''}</td>
    <td class="col-priority" data-label="Priority">${esc(i.priority)}</td>
    <td data-label="Notes" title="${esc(i.notes)}">${esc(i.notes)}</td>
    <td data-label="Status"><select class="status-sel ${(i.status||'WANTED').toLowerCase()}" onchange="updateStatus(${i.id},this)">${statusOptions(i.status)}</select></td>
    <td class="col-actions" data-label=""><button class="edit" onclick="openEdit(${i.id})">Edit</button> <button class="del" onclick="archiveItem(${i.id})">Archive</button></td>
  </tr>`).join('') : '<tr><td colspan="9">No items</td></tr>';
}

function sortBy(field) {
  if (_sortField === field) { _sortAsc = !_sortAsc; }
  else { _sortField = field; _sortAsc = true; }
  document.querySelectorAll('.sort-bar button[data-field]').forEach(btn => {
    btn.className = btn.dataset.field === field ? (_sortAsc ? 'active' : 'active desc') : '';
  });
  renderItems();
}

function setCols(n, btn, tbodySel) {
  document.querySelector(tbodySel).style.gridTemplateColumns =
    n ? `repeat(${n}, 1fr)` : 'repeat(auto-fill, minmax(240px, 1fr))';
  btn.closest('.sort-bar').querySelectorAll('.col-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

async function loadItems() {
  _items = await (await api('/wishlist')).json();
  renderItems();
}

async function addItem() {
  const url = get('w-url').value.trim();
  if (!url) return alert('URL is required.');
  const body = { url, priority: get('w-priority').value };
  const name = get('w-name').value.trim();
  const brandId = get('w-brand').value;
  const categoryId = get('w-category').value;
  const price = get('w-price').value;
  const notes = get('w-notes').value.trim();
  const imgUrl = get('w-image-url').value.trim();
  if (name) body.name = name;
  if (brandId) body.brandId = +brandId;
  if (categoryId) body.categoryId = +categoryId;
  if (price) body.price = +price;
  if (notes) body.notes = notes;
  if (imgUrl) body.imageUrl = imgUrl;
  await api('/wishlist', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  get('w-url').value = get('w-name').value = get('w-price').value = get('w-notes').value = get('w-image-url').value = '';
  get('w-brand').value = get('w-category').value = '';
  showToast('Item added.');
  loadItems();
}

function statusOptions(current) {
  return ['WANTED','ORDERED','OWNED'].map(s =>
    `<option value="${s}" ${current===s?'selected':''}>${s[0]+s.slice(1).toLowerCase()}</option>`
  ).join('');
}

async function updateStatus(id, sel) {
  const status = sel.value;
  sel.className = 'status-sel ' + status.toLowerCase();
  await api('/wishlist/'+id+'/status?status='+status, {method:'PATCH'});
  if (status === 'OWNED') {
    showToast('Moved to Collection.');
    loadItems();
  }
}

async function loadCollection() {
  const items = await (await api('/wishlist/owned')).json();
  const bar = get('col-summary-bar');
  if (items.length) {
    const total = items.length;
    const priced = items.filter(i => i.price != null);
    const totalPrice = priced.reduce((s, i) => s + Number(i.price), 0);
    bar.innerHTML = `<span style="color:var(--text);font-weight:600">${total} items</span>`
      + (priced.length ? `&ensp;<span style="color:#60b878">¥${totalPrice.toLocaleString()}</span>` : '');
  } else {
    bar.innerHTML = '';
  }
  get('col-list').innerHTML = items.length ? items.map(i => `<tr>
    ${i.imageUrl ? `<td class="col-img" onclick="viewImg('${esc(i.imageUrl)}')"><img src="${esc(i.imageUrl)}" alt="image"></td>` : ''}
    <td data-label="Name"><a href="${esc(i.url)}" target="_blank">${esc(i.name || i.url)}</a></td>
    <td data-label="Brand">${esc(i.brand?.name)}</td>
    <td data-label="Category">${esc(i.category?.name)}</td>
    <td data-label="Price">${i.price != null ? '¥'+Number(i.price).toLocaleString() : ''}</td>
    <td data-label="Notes">${esc(i.notes)}</td>
    <td class="col-actions"><button class="edit" onclick="moveToWanted(${i.id})">↩ Wanted</button></td>
  </tr>`).join('') : '<tr><td colspan="7" style="color:var(--muted)">No items in collection yet</td></tr>';
}

async function moveToWanted(id) {
  await api('/wishlist/'+id+'/status?status=WANTED', {method:'PATCH'});
  showToast('Moved back to Items.');
  loadCollection(); loadItems();
}

async function archiveItem(id) {
  await api('/wishlist/'+id, {method:'DELETE'});
  showToast('Item archived.');
  loadItems();
}

async function restoreItem(id) {
  await api('/wishlist/'+id+'/restore', {method:'POST'});
  showToast('Item restored.');
  loadItems(); loadArchive();
}

async function delItemPermanent(id) {
  if (confirm('Permanently delete? This cannot be undone.')) {
    await api('/wishlist/'+id+'/permanent', {method:'DELETE'});
    showToast('Item deleted.');
    loadArchive();
  }
}

async function loadArchive() {
  const items = await (await api('/wishlist/deleted')).json();
  get('arc-list').innerHTML = items.length ? items.map(i => `<tr>
    ${i.imageUrl ? `<td class="col-img" data-label="" onclick="viewImg('${esc(i.imageUrl)}')"><img src="${esc(i.imageUrl)}" alt="image"></td>` : '<td class="col-img" data-label=""></td>'}
    <td data-label="Name"><a href="${esc(i.url)}" target="_blank">${esc(i.name || i.url)}</a></td>
    <td data-label="Brand">${esc(i.brand?.name)}</td>
    <td data-label="Price">${i.price != null ? '¥'+Number(i.price).toLocaleString() : ''}</td>
    <td data-label="Archived" style="font-size:0.82rem;color:var(--muted)">${i.deletedAt ? new Date(i.deletedAt).toLocaleDateString('ja-JP') : ''}</td>
    <td class="col-actions" data-label=""><button class="edit" onclick="restoreItem(${i.id})">Restore</button> <button class="del" onclick="delItemPermanent(${i.id})">Delete</button></td>
  </tr>`).join('') : '<tr><td colspan="6">No archived items</td></tr>';
}

let _editItem = null;
async function openEdit(id) {
  _editItem = await (await api('/wishlist/'+id)).json();
  const i = _editItem;
  get('edit-id').value = i.id;
  get('edit-url').value = i.url ?? '';
  get('edit-name').value = i.name ?? '';
  get('edit-price').value = i.price ?? '';
  get('edit-notes').value = i.notes ?? '';
  get('edit-priority').value = i.priority ?? 'MEDIUM';
  // sync select options then restore value
  const bSel = get('edit-brand');
  bSel.innerHTML = get('w-brand').innerHTML;
  bSel.value = i.brand?.id ?? '';
  const cSel = get('edit-category');
  cSel.innerHTML = get('w-category').innerHTML;
  cSel.value = i.category?.id ?? '';
  // image preview
  get('edit-image-file').value = '';
  get('edit-file-name').textContent = 'No file chosen';
  const isExternal = i.imageUrl && !i.imageUrl.startsWith('/api/');
  get('edit-image-url').value = isExternal ? i.imageUrl : '';
  const preview = get('edit-image-preview');
  if (i.imageUrl) { preview.src = i.imageUrl + (isExternal ? '' : '?t=' + Date.now()); preview.style.display = 'block'; }
  else { preview.style.display = 'none'; preview.src = ''; }
  get('edit-modal').style.display = 'block';  // modal-overlay uses display:block
}

function previewImgFile(input) {
  const preview = get('edit-image-preview');
  if (input.files && input.files[0]) {
    get('edit-image-url').value = '';
    get('edit-file-name').textContent = input.files[0].name;
    preview.src = URL.createObjectURL(input.files[0]);
    preview.style.display = 'block';
  }
}

function previewImgUrl(input) {
  const preview = get('edit-image-preview');
  const url = input.value.trim();
  if (url) {
    get('edit-image-file').value = '';
    get('edit-file-name').textContent = 'No file chosen';
    preview.src = url;
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
    preview.src = '';
  }
}

function viewImg(url) {
  get('img-modal-src').src = url + '?t=' + Date.now();
  get('img-modal').style.display = 'block';
}

function closeEdit() {
  get('edit-modal').style.display = 'none';
}

async function saveItem() {
  const url = get('edit-url').value.trim();
  if (!url) return alert('URL is required.');
  const id = get('edit-id').value;
  const body = { url, priority: get('edit-priority').value };
  const name = get('edit-name').value.trim();
  const brandId = get('edit-brand').value;
  const categoryId = get('edit-category').value;
  const price = get('edit-price').value;
  const notes = get('edit-notes').value.trim();
  if (name) body.name = name;
  if (brandId) body.brandId = +brandId;
  if (categoryId) body.categoryId = +categoryId;
  if (price) body.price = +price;
  if (notes) body.notes = notes;
  const imgFile = get('edit-image-file').files[0];
  const imgUrl = get('edit-image-url').value.trim();
  if (!imgFile && imgUrl) body.imageUrl = imgUrl;
  await api('/wishlist/'+id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if (imgFile) {
    const fd = new FormData();
    fd.append('file', imgFile);
    await api('/wishlist/'+id+'/image', { method:'POST', body:fd });
  }
  closeEdit();
  showToast('Item saved.');
  loadItems();
}

// ---- Brands ----
async function loadBrands() {
  const brands = await (await api('/brands')).json();
  ['w-brand'].forEach(sid => {
    const sel = get(sid);
    const cur = sel.value;
    sel.innerHTML = '<option value="">Brand</option>' + brands.map(b => `<option value="${b.id}">${esc(b.name)}</option>`).join('');
    sel.value = cur;
  });

async function fetchInfo(btn, prefix) {
  const url = get(prefix + '-url').value.trim();
  if (!url) return;
  const orig = btn.textContent;
  btn.textContent = '···';
  btn.disabled = true;
  try {
    const info = await (await api('/scrape?url=' + encodeURIComponent(url))).json();
    if (info.name)     get(prefix + '-name').value  = info.name;
    if (info.price)    get(prefix + '-price').value = info.price;
    if (info.imageUrl) {
      get(prefix + '-image-url').value = info.imageUrl;
      if (prefix === 'edit') previewImgUrl(get('edit-image-url'));
    }
    if (info.brand) {
      const sel = get(prefix + '-brand');
      const opt = [...sel.options].find(o => o.text.toLowerCase() === info.brand.toLowerCase());
      if (opt) sel.value = opt.value;
    }
    if (info.category) {
      const sel = get(prefix + '-category');
      const q = info.category.toLowerCase();
      const opt = [...sel.options].find(o => o.text.toLowerCase() === q)
               ?? [...sel.options].find(o => o.text.toLowerCase().includes(q) || q.includes(o.text.toLowerCase()));
      if (opt) sel.value = opt.value;
    }
    btn.textContent = 'Done';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1000);
  } catch {
    btn.textContent = 'Failed';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1500);
  }
}

// ---- Mascot drag ----
(function() {
  const el = document.getElementById('mascot-wrap');
  let ox = 0, oy = 0, active = false;

  function applyPos(x, y) {
    x = Math.max(0, Math.min(x, window.innerWidth  - el.offsetWidth));
    y = Math.max(0, Math.min(y, window.innerHeight - el.offsetHeight));
    el.style.left   = x + 'px';
    el.style.top    = y + 'px';
    el.style.right  = 'auto';
    el.style.bottom = 'auto';
  }

  function savePos() {
    localStorage.setItem('mascot-pos-v2', JSON.stringify({ left: el.offsetLeft, top: el.offsetTop }));
  }

  // Restore saved position, else default to right side with room for bubble
  const saved = JSON.parse(localStorage.getItem('mascot-pos-v2') || 'null');
  if (saved) {
    applyPos(saved.left, saved.top);
  } else {
    el.style.top = '120px'; el.style.right = '16px';
  }

  // Hover messages
  const _msgs = [
    '何を買おうか悩んでるの？',
    'またウィッシュリストが増えてる…',
    'grailはもう手に入れた？',
    '今日もお買い物？',
    '気になるなら、すぐ追加したほうがいいわよ',
    'ちゃんと予算は大丈夫？',
  ];
  let _mi = 0;
  const _bubble = document.getElementById('mascot-bubble');
  el.addEventListener('mouseenter', () => {
    _bubble.textContent = _msgs[_mi % _msgs.length];
    _mi++;
  });

  el.addEventListener('mousedown', e => {
    active = true;
    const r = el.getBoundingClientRect();
    ox = e.clientX - r.left; oy = e.clientY - r.top;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!active) return;
    applyPos(e.clientX - ox, e.clientY - oy);
  });
  document.addEventListener('mouseup', () => { if (active) { active = false; savePos(); } });

  el.addEventListener('touchstart', e => {
    active = true;
    const t = e.touches[0], r = el.getBoundingClientRect();
    ox = t.clientX - r.left; oy = t.clientY - r.top;
    e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchmove', e => {
    if (!active) return;
    const t = e.touches[0];
    applyPos(t.clientX - ox, t.clientY - oy);
    e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchend', () => { if (active) { active = false; savePos(); } });
})();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
