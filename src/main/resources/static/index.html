<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mortlace</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #07050e;
      --card:      #0e0b18;
      --accent:    #7c3faa;
      --accent-lt: #a865d4;
      --border:    #2a1648;
      --thead-bg:  #07050e;
      --thead-fg:  #c4a0e0;
      --text:      #ede4f8;
      --muted:     #7a658e;
      --wine:      #6b1a2a;
      --font-body: "Plus Jakarta Sans", "Hiragino Kaku Gothic ProN", "Hiragino Kaku Gothic Pro", "Hiragino Kaku Gothic", YuGothic, "Yu Gothic", "メイリオ", Meiryo, "ＭＳ Ｐゴシック", "MS PGothic", sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body { background: var(--bg); }

    body {
      font-family: var(--font-body);
      color: var(--text);
      padding: 28px 24px;
      max-width: 900px;
      margin: 0 auto;
      min-height: 100vh;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    h1 {
      font-family: var(--font-body);
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: var(--text);
      text-align: center;
      letter-spacing: 0.14em;
      margin-bottom: 28px;
    }

    h2 {
      font-family: var(--font-body);
      font-size: clamp(0.95rem, 3vw, 1.2rem);
      color: var(--accent);
      letter-spacing: 0.05em;
      margin: 22px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    h3 { font-family: var(--font-body); color: var(--text); letter-spacing: 0.05em; }

    a { color: var(--accent-lt); text-decoration: none; }
    a:hover { text-decoration: underline; }

    input, select, textarea {
      padding: 8px 12px;
      margin: 2px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--font-body);
      background: #120d20;
      color: var(--text);
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 63, 170, 0.25);
    }

    button {
      padding: 6px 14px;
      cursor: pointer;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: #f0eafc;
      font-family: var(--font-body);
      font-size: 0.875rem;
      letter-spacing: 0.04em;
      transition: opacity .15s, box-shadow .15s;
    }
    button:hover { opacity: 0.88; box-shadow: 0 0 0 3px rgba(124, 63, 170, 0.2); }
    button.del  { background: #1e0c12; border-color: var(--wine); color: #d4a0a8; }
    button.edit { background: #180e2c; border-color: #2e1a50; }
    button.save { background: #120e20; border-color: #241840; }

    /* ---- generic table (Brands / Categories) ---- */
    .table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.88rem;
      table-layout: fixed;
      border: 1px solid var(--border);
    }
    th, td {
      border: 1px solid var(--border);
      padding: 7px 10px;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    th { background: var(--thead-bg); color: var(--thead-fg); font-weight: 600; letter-spacing: 0.04em; }
    tr:nth-child(even) td { background: rgba(255,255,255,0.03); }
    tr:hover td { background: rgba(168,164,184,0.07); }

    /* ---- Sort bar ---- */
    .sort-bar {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
      margin: 10px 0 4px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .sort-bar button {
      padding: 3px 10px;
      font-size: 0.78rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      opacity: 1;
    }
    .sort-bar button:hover { border-color: var(--accent); color: var(--accent-lt); }
    .sort-bar button.active { border-color: var(--accent); color: var(--accent-lt); background: rgba(168,164,184,0.08); }
    .sort-bar button[data-field].active::after {
      content: '';
      display: inline-block;
      width: 0; height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-bottom: 5px solid var(--accent);
      vertical-align: middle;
      margin-left: 5px;
    }
    .sort-bar button[data-field].active.desc::after {
      border-bottom: none;
      border-top: 5px solid var(--accent);
    }

    /* ---- Items: card layout ---- */
    #wishlist .table-wrap, #archive .table-wrap { overflow-x: visible; }
    #wishlist table, #archive table { display: block; border: none; table-layout: auto; margin-top: 14px; }
    #wishlist thead, #archive thead { display: none; }
    #archive tbody {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
      opacity: 0.72;
    }
    #archive tr {
      display: flex; flex-direction: column;
      border: 1px solid var(--border); background: var(--card);
      overflow: hidden;
    }
    #archive tr:hover { border-color: var(--accent); opacity: 1; }
    #archive tr:hover td, #archive tr:nth-child(even) td { background: transparent; }
    #archive td {
      display: flex; align-items: flex-start; gap: 10px;
      border: none; border-bottom: 1px solid rgba(50,46,60,0.5);
      padding: 7px 10px; white-space: normal; text-overflow: clip;
      overflow: visible; width: auto !important;
    }
    #archive td:last-child { border-bottom: none; }
    #archive td::before {
      content: attr(data-label); color: var(--muted);
      font-size: 0.8rem; font-weight: 600; min-width: 68px; flex-shrink: 0;
    }
    #archive td.col-img {
      padding: 0; height: 160px; overflow: hidden;
      border-bottom: 1px solid var(--border); cursor: pointer;
    }
    #archive td.col-img::before { display: none; }
    #archive td.col-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    #archive td.col-actions { justify-content: flex-end; padding: 8px 10px; margin-top: auto; }
    #archive td.col-actions::before { display: none; }
    #wishlist tbody {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }
    #wishlist tr {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      background: var(--card);
      overflow: hidden;
      transition: border-color 0.15s;
    }
    #wishlist tr:hover { border-color: var(--accent); }
    #wishlist tr:hover td,
    #wishlist tr:nth-child(even) td { background: transparent; }
    #wishlist tr.editing { border-color: var(--accent-lt); }
    #wishlist tr.editing td { background: #160e24; }
    #wishlist td {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      border: none;
      border-bottom: 1px solid rgba(50,46,60,0.5);
      padding: 7px 10px;
      white-space: normal;
      text-overflow: clip;
      overflow: visible;
      width: auto !important;
    }
    #wishlist td:last-child { border-bottom: none; }
    #wishlist td::before {
      content: attr(data-label);
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      min-width: 68px;
      flex-shrink: 0;
    }
    #wishlist td.col-img {
      padding: 0;
      height: 200px;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    #wishlist td.col-img::before { display: none; }
    #wishlist td.col-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }
    #wishlist td.col-img:hover img { transform: scale(1.04); }
    #wishlist td.col-actions { justify-content: flex-end; padding: 8px 10px; margin-top: auto; }
    #wishlist td.col-actions::before { display: none; }
    #wishlist td[data-label="URL"] { flex-wrap: wrap; align-items: center; }
    #wishlist td[data-label="URL"] .url-value {
      display: flex; align-items: center; gap: 4px; flex: 1; min-width: 0;
    }
    #wishlist td[data-label="URL"] a {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      min-width: 0; flex: 1;
    }

    .tabs {
      display: flex;
      margin-bottom: 24px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .tabs button {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      padding: 7px 18px;
      margin-bottom: -1px;
    }
    .tabs button.active {
      background: var(--card);
      color: var(--accent-lt);
      border-bottom: 1px solid var(--card);
      font-weight: 600;
    }
    .tabs button:hover:not(.active) { background: rgba(168,164,184,0.08); opacity: 1; }

    .tab { display: none; }
    .tab.active { display: block; }

    .form-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 4px; }
    .form-row input, .form-row select { flex: 1 1 130px; min-width: 0; }
    .form-row button { flex: 0 0 auto; }

    #w-url                     { flex: 1 1 260px; }
    #w-name                    { flex: 2 1 160px; }
    #w-brand, #w-category      { flex: 1 1 110px; }
    #w-priority                { flex: 0 1 100px; }
    #w-price                   { flex: 0 0 90px; }
    #w-notes, #w-image-url     { flex: 2 1 160px; }

    .sort-sep { flex: 1; }
    .sort-label, .col-label { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(4,4,4,0.85); z-index: 100;
    }
    .modal-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(124,63,170,0.15);
      padding: 28px;
      max-width: 500px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      margin: 40px auto;
    }
    .modal-box h3 { margin: 0 0 18px; }
    .modal-grid { display: grid; gap: 8px; }
    .modal-grid input, .modal-grid select { width: 100%; }
    .modal-footer { margin-top: 18px; display: flex; gap: 8px; justify-content: flex-end; }
    .modal-label { font-size: 0.85rem; color: var(--muted); margin-bottom: 2px; display: block; }
    .img-preview { width: 100%; max-height: 200px; object-fit: contain; border: 1px solid var(--border); margin-top: 6px; display: none; }

    .file-input-wrap { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .file-input-wrap input[type="file"] { display: none; }
    .file-btn-label {
      padding: 6px 14px; cursor: pointer;
      border: 1px solid var(--accent); background: var(--accent);
      border-radius: 6px;
      color: #f0eafc; font-family: var(--font-body);
      font-size: 0.875rem; letter-spacing: 0.04em; white-space: nowrap;
      transition: opacity .15s;
    }
    .file-btn-label:hover { opacity: 0.82; }
    .file-name-display { font-size: 0.85rem; color: var(--muted); }

    /* ---- Toast ---- */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #1e1430;
      border: 1px solid var(--accent);
      color: var(--accent-lt);
      padding: 9px 22px;
      border-radius: 20px;
      font-size: 0.88rem;
      letter-spacing: 0.04em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 300;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ---- Summary bar ---- */
    #summary-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      align-items: center;
      padding: 8px 12px;
      margin: 10px 0 6px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    #summary-bar .s-total { color: var(--text); font-weight: 600; }
    #summary-bar .s-price { color: var(--accent-lt); }
    .s-chip {
      padding: 2px 9px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 0.78rem;
    }
    .s-chip.low    { border-color: #2a3a2a; color: #7eb87e; }
    .s-chip.medium { border-color: #2a2a3a; color: #7e8ebe; }
    .s-chip.high   { border-color: #3a2a2a; color: #be8e7e; }
    .s-chip.grail  { border-color: #3a1f4a; color: var(--accent-lt); }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* === Responsive === */

    @media (max-width: 768px) {
      #wishlist tbody, #archive tbody {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      }
      /* フォーム行2・3: 中間幅でも見やすく */
      #w-name { flex: 1 1 100%; }
      #w-brand, #w-category { flex: 1 1 120px; }
    }

    @media (max-width: 600px) {
      body { padding: 12px 10px; border-left: none; border-right: none; }

      /* タブ: 4つ並ぶので小さめに */
      .tabs button { padding: 6px 10px; font-size: 0.8rem; }

      /* Add form: 全フィールドを100%幅に */
      .form-row input, .form-row select { flex: 1 1 100%; }
      #w-url, #w-name, #w-brand, #w-category,
      #w-price, #w-priority, #w-notes, #w-image-url { flex: 1 1 100%; }

      /* ソートバー: Cols切り替えはモバイル1カラムでは不要なので非表示 */
      .col-btn, .sort-sep, .col-label { display: none; }
      .sort-bar { gap: 3px 4px; font-size: 0.76rem; }
      .sort-bar button[data-field] { padding: 3px 7px; }

      /* カード: 1カラム */
      #wishlist tbody, #archive tbody { grid-template-columns: 1fr; }
      #wishlist td.col-img { height: 200px; }
      #archive td.col-img { height: 150px; }
      #wishlist td::before, #archive td::before { min-width: 52px; font-size: 0.75rem; }

      /* モーダル */
      .modal-box { margin: 8px; padding: 16px; max-height: calc(100vh - 16px); }

      /* ブランド・カテゴリーテーブル */
      #brands table, #categories table { font-size: 0.8rem; }
      #brands th, #brands td, #categories th, #categories td { padding: 5px 6px; }

      /* サマリーバー */
      #summary-bar { font-size: 0.78rem; padding: 6px 10px; gap: 4px 8px; }
    }

    @media (max-width: 400px) {
      .tabs button { padding: 5px 7px; font-size: 0.76rem; }
      h1 { font-size: 1.3rem; margin-bottom: 18px; }
    }
  </style>
</head>
<body>
<div id="toast"></div>
<h1>mortlace</h1>

<div class="tabs">
  <button class="active" onclick="show('wishlist',this)">Items</button>
  <button onclick="show('archive',this)">Archive</button>
  <button onclick="show('brands',this)">Brands</button>
  <button onclick="show('categories',this)">Categories</button>
</div>

<!-- wishlist -->
<div id="wishlist" class="tab active">
  <h2>Add Item</h2>
  <div class="form-row">
    <input id="w-url" placeholder="URL (required)">
    <button onclick="fetchInfo(this,'w')">Fetch</button>
  </div>
  <div class="form-row">
    <input id="w-name" placeholder="Name">
    <select id="w-brand"><option value="">Brand</option></select>
    <select id="w-category"><option value="">Category</option></select>
  </div>
  <div class="form-row">
    <input id="w-price" type="number" placeholder="Price">
    <select id="w-priority">
      <option value="MEDIUM">Medium</option>
      <option value="LOW">Low</option>
      <option value="HIGH">High</option>
      <option value="GRAIL">Grail</option>
    </select>
    <input id="w-notes" placeholder="Notes">
    <input id="w-image-url" type="url" placeholder="Image URL">
    <button onclick="addItem()">Add</button>
  </div>

  <div class="sort-bar">
    <span class="sort-label">Sort:</span>
    <button data-field="name"     onclick="sortBy('name')">Name</button>
    <button data-field="brand"    onclick="sortBy('brand')">Brand</button>
    <button data-field="category" onclick="sortBy('category')">Category</button>
    <button data-field="price"    onclick="sortBy('price')">Price</button>
    <button data-field="priority" onclick="sortBy('priority')">Priority</button>
    <span class="sort-sep"></span>
    <span class="col-label">Cols:</span>
    <button class="col-btn active" onclick="setCols(0,this)">Auto</button>
    <button class="col-btn" onclick="setCols(2,this)">2</button>
    <button class="col-btn" onclick="setCols(3,this)">3</button>
    <button class="col-btn" onclick="setCols(4,this)">4</button>
  </div>

  <div id="summary-bar"></div>

  <div class="table-wrap">
    <table>
      <thead><tr><th class="col-img">Image</th><th>URL</th><th>Name</th><th>Brand</th><th>Category</th><th class="col-price">Price</th><th class="col-priority">Priority</th><th>Notes</th><th class="col-actions"></th></tr></thead>
      <tbody id="w-list"></tbody>
    </table>
  </div>
</div>

<!-- edit modal -->
<div id="edit-modal" class="modal-overlay">
  <div class="modal-box">
    <h3>Edit Item</h3>
    <input type="hidden" id="edit-id">
    <div class="modal-grid">
      <input id="edit-url" placeholder="URL (required)">
      <button onclick="fetchInfo(this,'edit')" style="width:100%;margin:2px 0">Fetch</button>
      <input id="edit-name" placeholder="Name">
      <select id="edit-brand"><option value="">Brand</option></select>
      <select id="edit-category"><option value="">Category</option></select>
      <input id="edit-price" type="number" placeholder="Price">
      <select id="edit-priority">
        <option value="LOW">Low</option>
        <option value="MEDIUM">Medium</option>
        <option value="HIGH">High</option>
        <option value="GRAIL">Grail</option>
      </select>
      <input id="edit-notes" placeholder="Notes">
      <div>
        <label class="modal-label">Image URL</label>
        <input id="edit-image-url" type="url" placeholder="https://... (image URL)" oninput="previewImgUrl(this)">
        <label class="modal-label" style="margin-top:6px">or image file</label>
        <div class="file-input-wrap">
          <label class="file-btn-label" for="edit-image-file">Choose file</label>
          <span class="file-name-display" id="edit-file-name">No file chosen</span>
          <input id="edit-image-file" type="file" accept="image/*" onchange="previewImgFile(this)">
        </div>
        <img id="edit-image-preview" class="img-preview">
      </div>
    </div>
    <div class="modal-footer">
      <button onclick="closeEdit()">Cancel</button>
      <button class="save" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<!-- image viewer -->
<div id="img-modal" style="display:none;position:fixed;inset:0;background:rgba(4,4,4,0.90);z-index:200;cursor:pointer" onclick="this.style.display='none'">
  <img id="img-modal-src" style="max-width:90%;max-height:90%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid #a8a4b8">
</div>

<!-- archive -->
<div id="archive" class="tab">
  <h2>Archive</h2>
  <div class="table-wrap">
    <table>
      <thead><tr><th class="col-img">Image</th><th>Name</th><th>Brand</th><th>Price</th><th>Archived</th><th></th></tr></thead>
      <tbody id="arc-list"></tbody>
    </table>
  </div>
</div>

<!-- brands -->
<div id="brands" class="tab">
  <h2>Add Brand</h2>
  <div class="form-row">
    <input id="b-name" placeholder="Brand name (required)">
    <input id="b-url" placeholder="Official URL">
    <button onclick="addBrand()">Add</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>Name</th><th>URL</th><th></th></tr></thead>
      <tbody id="b-list"></tbody>
    </table>
  </div>
</div>

<!-- categories -->
<div id="categories" class="tab">
  <h2>Add Category</h2>
  <div class="form-row">
    <input id="c-name" placeholder="Category name (required)">
    <button onclick="addCategory()">Add</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>Name</th><th></th></tr></thead>
      <tbody id="c-list"></tbody>
    </table>
  </div>
</div>

<script>
let _toastTimer;
function showToast(msg) {
  const el = get('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

function show(id, btn) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if (id === 'archive') loadArchive();
}

const get = id => document.getElementById(id);
const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

async function api(path, opt) {
  const r = await fetch('/api' + path, opt);
  return r.ok ? r : Promise.reject(r.status);
}

// ---- Wishlist ----
let _items = [], _sortField = null, _sortAsc = true;
const PRIORITY_ORDER = { LOW: 1, MEDIUM: 2, HIGH: 3, GRAIL: 4 };

function renderSummary() {
  const bar = get('summary-bar');
  if (!_items.length) { bar.innerHTML = '<span>No items</span>'; return; }
  const total = _items.length;
  const priced = _items.filter(i => i.price != null);
  const totalPrice = priced.reduce((s, i) => s + Number(i.price), 0);
  const counts = { LOW: 0, MEDIUM: 0, HIGH: 0, GRAIL: 0 };
  _items.forEach(i => { if (counts[i.priority] != null) counts[i.priority]++; });
  const chips = [
    counts.LOW    ? `<span class="s-chip low">Low ${counts.LOW}</span>` : '',
    counts.MEDIUM ? `<span class="s-chip medium">Medium ${counts.MEDIUM}</span>` : '',
    counts.HIGH   ? `<span class="s-chip high">High ${counts.HIGH}</span>` : '',
    counts.GRAIL  ? `<span class="s-chip grail">Grail ${counts.GRAIL}</span>` : '',
  ].join('');
  bar.innerHTML = `<span class="s-total">${total} items</span>`
    + (priced.length ? `<span class="s-price">¥${totalPrice.toLocaleString()}</span>` : '')
    + chips;
}

function renderItems() {
  const items = [..._items];
  if (_sortField) {
    items.sort((a, b) => {
      let va, vb, r;
      if (_sortField === 'price') {
        va = a.price ?? -1; vb = b.price ?? -1; r = va - vb;
      } else if (_sortField === 'priority') {
        va = PRIORITY_ORDER[a.priority] ?? 0; vb = PRIORITY_ORDER[b.priority] ?? 0; r = va - vb;
      } else {
        const get2 = (i) => (_sortField === 'brand' ? i.brand?.name : _sortField === 'category' ? i.category?.name : i.name) ?? '';
        r = get2(a).localeCompare(get2(b), 'ja');
      }
      return _sortAsc ? r : -r;
    });
  }
  renderSummary();
  get('w-list').innerHTML = items.length ? items.map(i => `<tr>
    ${i.imageUrl ? `<td class="col-img" data-label="" onclick="viewImg('${esc(i.imageUrl)}')"><img src="${esc(i.imageUrl)}" alt="image"></td>` : ''}
    <td data-label="URL" title="${esc(i.url)}"><span class="url-value"><a href="${esc(i.url)}" target="_blank">${esc((() => { try { return new URL(i.url).hostname; } catch(e) { return i.url; } })())}</a></span></td>
    <td data-label="Name" title="${esc(i.name)}">${esc(i.name)}</td>
    <td data-label="Brand" title="${esc(i.brand?.name)}">${esc(i.brand?.name)}</td>
    <td data-label="Category" title="${esc(i.category?.name)}">${esc(i.category?.name)}</td>
    <td class="col-price" data-label="Price">${i.price != null ? '¥'+Number(i.price).toLocaleString() : ''}</td>
    <td class="col-priority" data-label="Priority">${esc(i.priority)}</td>
    <td data-label="Notes" title="${esc(i.notes)}">${esc(i.notes)}</td>
    <td class="col-actions" data-label=""><button class="edit" onclick="openEdit(${i.id})">Edit</button> <button class="del" onclick="archiveItem(${i.id})">Archive</button></td>
  </tr>`).join('') : '<tr><td colspan="9">No items</td></tr>';
}

function sortBy(field) {
  if (_sortField === field) { _sortAsc = !_sortAsc; }
  else { _sortField = field; _sortAsc = true; }
  document.querySelectorAll('.sort-bar button[data-field]').forEach(btn => {
    btn.className = btn.dataset.field === field ? (_sortAsc ? 'active' : 'active desc') : '';
  });
  renderItems();
}

function setCols(n, btn) {
  document.querySelector('#wishlist tbody').style.gridTemplateColumns =
    n ? `repeat(${n}, 1fr)` : 'repeat(auto-fill, minmax(240px, 1fr))';
  document.querySelectorAll('.col-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

async function loadItems() {
  _items = await (await api('/wishlist')).json();
  renderItems();
}

async function addItem() {
  const url = get('w-url').value.trim();
  if (!url) return alert('URL is required.');
  const body = { url, priority: get('w-priority').value };
  const name = get('w-name').value.trim();
  const brandId = get('w-brand').value;
  const categoryId = get('w-category').value;
  const price = get('w-price').value;
  const notes = get('w-notes').value.trim();
  const imgUrl = get('w-image-url').value.trim();
  if (name) body.name = name;
  if (brandId) body.brandId = +brandId;
  if (categoryId) body.categoryId = +categoryId;
  if (price) body.price = +price;
  if (notes) body.notes = notes;
  if (imgUrl) body.imageUrl = imgUrl;
  await api('/wishlist', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  get('w-url').value = get('w-name').value = get('w-price').value = get('w-notes').value = get('w-image-url').value = '';
  get('w-brand').value = get('w-category').value = '';
  showToast('Item added.');
  loadItems();
}

async function archiveItem(id) {
  await api('/wishlist/'+id, {method:'DELETE'});
  showToast('Item archived.');
  loadItems();
}

async function restoreItem(id) {
  await api('/wishlist/'+id+'/restore', {method:'POST'});
  showToast('Item restored.');
  loadItems(); loadArchive();
}

async function delItemPermanent(id) {
  if (confirm('Permanently delete? This cannot be undone.')) {
    await api('/wishlist/'+id+'/permanent', {method:'DELETE'});
    showToast('Item deleted.');
    loadArchive();
  }
}

async function loadArchive() {
  const items = await (await api('/wishlist/deleted')).json();
  get('arc-list').innerHTML = items.length ? items.map(i => `<tr>
    ${i.imageUrl ? `<td class="col-img" data-label="" onclick="viewImg('${esc(i.imageUrl)}')"><img src="${esc(i.imageUrl)}" alt="image"></td>` : '<td class="col-img" data-label=""></td>'}
    <td data-label="Name"><a href="${esc(i.url)}" target="_blank">${esc(i.name || i.url)}</a></td>
    <td data-label="Brand">${esc(i.brand?.name)}</td>
    <td data-label="Price">${i.price != null ? '¥'+Number(i.price).toLocaleString() : ''}</td>
    <td data-label="Archived" style="font-size:0.82rem;color:var(--muted)">${i.deletedAt ? new Date(i.deletedAt).toLocaleDateString('ja-JP') : ''}</td>
    <td class="col-actions" data-label=""><button class="edit" onclick="restoreItem(${i.id})">Restore</button> <button class="del" onclick="delItemPermanent(${i.id})">Delete</button></td>
  </tr>`).join('') : '<tr><td colspan="6">No archived items</td></tr>';
}

let _editItem = null;
async function openEdit(id) {
  _editItem = await (await api('/wishlist/'+id)).json();
  const i = _editItem;
  get('edit-id').value = i.id;
  get('edit-url').value = i.url ?? '';
  get('edit-name').value = i.name ?? '';
  get('edit-price').value = i.price ?? '';
  get('edit-notes').value = i.notes ?? '';
  get('edit-priority').value = i.priority ?? 'MEDIUM';
  // sync select options then restore value
  const bSel = get('edit-brand');
  bSel.innerHTML = get('w-brand').innerHTML;
  bSel.value = i.brand?.id ?? '';
  const cSel = get('edit-category');
  cSel.innerHTML = get('w-category').innerHTML;
  cSel.value = i.category?.id ?? '';
  // image preview
  get('edit-image-file').value = '';
  get('edit-file-name').textContent = 'No file chosen';
  const isExternal = i.imageUrl && !i.imageUrl.startsWith('/api/');
  get('edit-image-url').value = isExternal ? i.imageUrl : '';
  const preview = get('edit-image-preview');
  if (i.imageUrl) { preview.src = i.imageUrl + (isExternal ? '' : '?t=' + Date.now()); preview.style.display = 'block'; }
  else { preview.style.display = 'none'; preview.src = ''; }
  get('edit-modal').style.display = 'block';  // modal-overlay uses display:block
}

function previewImgFile(input) {
  const preview = get('edit-image-preview');
  if (input.files && input.files[0]) {
    get('edit-image-url').value = '';
    get('edit-file-name').textContent = input.files[0].name;
    preview.src = URL.createObjectURL(input.files[0]);
    preview.style.display = 'block';
  }
}

function previewImgUrl(input) {
  const preview = get('edit-image-preview');
  const url = input.value.trim();
  if (url) {
    get('edit-image-file').value = '';
    get('edit-file-name').textContent = 'No file chosen';
    preview.src = url;
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
    preview.src = '';
  }
}

function viewImg(url) {
  get('img-modal-src').src = url + '?t=' + Date.now();
  get('img-modal').style.display = 'block';
}

function closeEdit() {
  get('edit-modal').style.display = 'none';
}

async function saveItem() {
  const url = get('edit-url').value.trim();
  if (!url) return alert('URL is required.');
  const id = get('edit-id').value;
  const body = { url, priority: get('edit-priority').value };
  const name = get('edit-name').value.trim();
  const brandId = get('edit-brand').value;
  const categoryId = get('edit-category').value;
  const price = get('edit-price').value;
  const notes = get('edit-notes').value.trim();
  if (name) body.name = name;
  if (brandId) body.brandId = +brandId;
  if (categoryId) body.categoryId = +categoryId;
  if (price) body.price = +price;
  if (notes) body.notes = notes;
  const imgFile = get('edit-image-file').files[0];
  const imgUrl = get('edit-image-url').value.trim();
  if (!imgFile && imgUrl) body.imageUrl = imgUrl;
  await api('/wishlist/'+id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if (imgFile) {
    const fd = new FormData();
    fd.append('file', imgFile);
    await api('/wishlist/'+id+'/image', { method:'POST', body:fd });
  }
  closeEdit();
  showToast('Item saved.');
  loadItems();
}

// ---- Brands ----
async function loadBrands() {
  const brands = await (await api('/brands')).json();
  ['w-brand'].forEach(sid => {
    const sel = get(sid);
    const cur = sel.value;
    sel.innerHTML = '<option value="">Brand</option>' + brands.map(b => `<option value="${b.id}">${esc(b.name)}</option>`).join('');
    sel.value = cur;
  });
  get('b-list').innerHTML = brands.map(b => `<tr>
    <td>${esc(b.name)}</td>
    <td>${b.url ? `<a href="${esc(b.url)}" target="_blank">${esc(b.url)}</a>` : ''}</td>
    <td><button class="edit" onclick="editBrand(${b.id},'${esc(b.name)}','${esc(b.url??'')}')">Edit</button> <button class="del" onclick="delBrand(${b.id})">Delete</button></td>
  </tr>`).join('') || '<tr><td colspan="3">No brands</td></tr>';
}

async function addBrand() {
  const name = get('b-name').value.trim();
  if (!name) return alert('Brand name is required.');
  const url = get('b-url').value.trim();
  await api('/brands', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, url:url||null}) })
    .catch(s => s===409 ? alert('Already exists.') : null);
  get('b-name').value = get('b-url').value = '';
  loadBrands();
}

async function delBrand(id) {
  if (confirm('Delete this brand?')) { await api('/brands/'+id, {method:'DELETE'}); loadBrands(); }
}

function editBrand(id, name, url) {
  const row = [...document.querySelectorAll('#b-list tr')].find(r => r.innerHTML.includes(`editBrand(${id},`));
  if (!row) return;
  row.classList.add('editing');
  row.innerHTML = `
    <td><input id="eb-name-${id}" value="${esc(name)}" placeholder="Brand name (required)"></td>
    <td><input id="eb-url-${id}" value="${esc(url)}" placeholder="Official URL" size="30"></td>
    <td>
      <button class="save" onclick="saveBrand(${id})">Save</button>
      <button onclick="loadBrands()">Cancel</button>
    </td>`;
}

async function saveBrand(id) {
  const name = get('eb-name-'+id).value.trim();
  if (!name) return alert('Brand name is required.');
  const url = get('eb-url-'+id).value.trim();
  await api('/brands/'+id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, url:url||null}) })
    .catch(s => s===409 ? alert('Already exists.') : null);
  loadBrands();
}

// ---- Categories ----
async function loadCategories() {
  const cats = await (await api('/categories')).json();
  ['w-category'].forEach(sid => {
    const sel = get(sid);
    const cur = sel.value;
    sel.innerHTML = '<option value="">Category</option>' + cats.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
    sel.value = cur;
  });
  get('c-list').innerHTML = cats.map(c => `<tr>
    <td>${esc(c.name)}</td>
    <td><button class="edit" onclick="editCategory(${c.id},'${esc(c.name)}')">Edit</button> <button class="del" onclick="delCategory(${c.id})">Delete</button></td>
  </tr>`).join('') || '<tr><td colspan="2">No categories</td></tr>';
}

async function addCategory() {
  const name = get('c-name').value.trim();
  if (!name) return alert('Category name is required.');
  await api('/categories', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name}) })
    .catch(s => s===409 ? alert('Already exists.') : null);
  get('c-name').value = '';
  loadCategories();
}

async function delCategory(id) {
  if (confirm('Delete this category?')) { await api('/categories/'+id, {method:'DELETE'}); loadCategories(); }
}

function editCategory(id, name) {
  const row = [...document.querySelectorAll('#c-list tr')].find(r => r.innerHTML.includes(`editCategory(${id},`));
  if (!row) return;
  row.classList.add('editing');
  row.innerHTML = `
    <td><input id="ec-name-${id}" value="${esc(name)}" placeholder="Category name (required)"></td>
    <td>
      <button class="save" onclick="saveCategory(${id})">Save</button>
      <button onclick="loadCategories()">Cancel</button>
    </td>`;
}

async function saveCategory(id) {
  const name = get('ec-name-'+id).value.trim();
  if (!name) return alert('Category name is required.');
  await api('/categories/'+id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name}) })
    .catch(s => s===409 ? alert('Already exists.') : null);
  loadCategories();
}

async function fetchInfo(btn, prefix) {
  const url = get(prefix + '-url').value.trim();
  if (!url) return;
  const orig = btn.textContent;
  btn.textContent = '···';
  btn.disabled = true;
  try {
    const info = await (await api('/scrape?url=' + encodeURIComponent(url))).json();
    if (info.name)     get(prefix + '-name').value  = info.name;
    if (info.price)    get(prefix + '-price').value = info.price;
    if (info.imageUrl) {
      get(prefix + '-image-url').value = info.imageUrl;
      if (prefix === 'edit') previewImgUrl(get('edit-image-url'));
    }
    if (info.brand) {
      const sel = get(prefix + '-brand');
      const opt = [...sel.options].find(o => o.text.toLowerCase() === info.brand.toLowerCase());
      if (opt) sel.value = opt.value;
    }
    if (info.category) {
      const sel = get(prefix + '-category');
      const q = info.category.toLowerCase();
      const opt = [...sel.options].find(o => o.text.toLowerCase() === q)
               ?? [...sel.options].find(o => o.text.toLowerCase().includes(q) || q.includes(o.text.toLowerCase()));
      if (opt) sel.value = opt.value;
    }
    btn.textContent = 'Done';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1000);
  } catch {
    btn.textContent = 'Failed';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1500);
  }
}

loadItems(); loadBrands(); loadCategories();

</script>
</body>
</html>
