spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:h2:file:./data/wishlistdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

server:
  port: 8080

mortlace:
  url-check:
    interval-ms: 1800000

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /api-docs
