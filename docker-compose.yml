services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_USER: wishlist
      DB_PASS: wishlist
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wishlistdb
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    volumes:
      - app_data:/app/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wishlistdb
      POSTGRES_USER: wishlist
      POSTGRES_PASSWORD: wishlist
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wishlist -d wishlistdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  app_data:
